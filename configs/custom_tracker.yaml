tracker_type: level2_bytetrack

# Detection split thresholds. The YOLO conf threshold should stay lower than
# track_low_thresh so weak detections are available for recovery.
track_high_thresh: 0.22
track_low_thresh: 0.06
new_track_thresh: 0.30
track_buffer: 55
match_thresh: 0.78
fuse_score: True

# Level 2 association weights.
center_weight: 0.12
shape_weight: 0.05
score_weight: 0.08
class_mismatch_penalty: 0.25

# Detector pre-filtering before tracking.
min_box_area: 48
max_aspect_ratio: 8.0
