tracker_type: level2_bytetrack

# Middle-ground thresholds for the fine-tuned detector: recover more vehicles
# than the original Level 2 config while avoiding the FP spike from very low
# new-track thresholds.
track_high_thresh: 0.14
track_low_thresh: 0.03
new_track_thresh: 0.20
track_buffer: 60
match_thresh: 0.78
fuse_score: True

# Level 2 association weights.
center_weight: 0.12
shape_weight: 0.05
score_weight: 0.07
class_mismatch_penalty: 0.0

# Detector pre-filtering before tracking.
min_box_area: 48
max_aspect_ratio: 8.0
