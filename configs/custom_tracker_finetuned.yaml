tracker_type: level2_bytetrack

# Fine-tuned one-class detector scores are calibrated differently from the
# COCO-pretrained model, so keep more candidate boxes for vehicle recovery.
track_high_thresh: 0.08
track_low_thresh: 0.01
new_track_thresh: 0.10
track_buffer: 60
match_thresh: 0.80
fuse_score: True

# Level 2 association weights.
center_weight: 0.12
shape_weight: 0.05
score_weight: 0.06
class_mismatch_penalty: 0.0

# Detector pre-filtering before tracking.
min_box_area: 48
max_aspect_ratio: 8.0
